# This workflow will build a MuleSoft project and deploy to CloudHub

name: Build and Deploy to Sandbox

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      CA_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
      CA_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: zulu

      - name: Print effective Maven settings (optional)
        run: mvn help:effective-settings

      - name: Build with Maven
        run: mvn -B package -s .maven/settings.xml

      - name: Stamp artifact with commit hash
        run: |
          artifactName=$(ls target/*.jar | head -1)
          commitHash=$(git rev-parse --short "$GITHUB_SHA")
          newArtifactName=$(echo $artifactName | sed "s/.jar/-$commitHash.jar/")
          mv "$artifactName" "$newArtifactName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: artifacts
          path: target/*.jar

  upload:
    needs: build
    runs-on: ubuntu-latest
    env:
      CA_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
      CA_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: artifacts

      - name: Upload to Anypoint Exchange
        run: |
          artifactName=$(ls *.jar | head -1)
          mvn deploy \
            -s .maven/settings.xml \
            -Dmule.artifact=$artifactName

  deploy:
    needs: upload
    runs-on: ubuntu-latest
    env:
      CA_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
      CA_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: artifacts

      - name: Deploy to CloudHub Sandbox
        run: |
          artifactName=$(ls *.jar | head -1)
          mvn deploy -DmuleDeploy \
            -Dmule.artifact=$artifactName \
            -s .maven/settings.xml \
            -DskipTests \
            -DskipDeploymentVerification=true
